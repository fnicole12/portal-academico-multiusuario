<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
</head>

<body>

<h1>Iniciar sesión</h1>

<form method="POST">

    <input
        type="text"
        name="user_id"
        placeholder="Usuario"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Contraseña"
        required
    >

    <br><br>

    <button type="submit">
        Entrar
    </button>

</form>

</body>
</html>
